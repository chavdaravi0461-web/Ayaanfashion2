version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ayaan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-ayaan}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ayaan_dev_password}
      POSTGRES_DB: ${DB_NAME:-ayaan_fashion}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ayaan} -d ${DB_NAME:-ayaan_fashion}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ayaan-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-ayaan}:${DB_PASSWORD:-ayaan_dev_password}@postgres:5432/${DB_NAME:-ayaan_fashion}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      PORT: 4000
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ayaan-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  backend_uploads:
